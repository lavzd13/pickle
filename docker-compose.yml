services:
  db:
    image: postgres:15-alpine
    restart: unless-stopped
    command: postgres -c max_connections=200
    volumes:
      - ./data/postgres:/var/lib/postgresql/data
    env_file:
      - .env
    networks:
      - default

  redis:
    build: .
    restart: unless-stopped
    command: redis-server /app/redis.conf
    networks:
      - default

  web:
    build: .
    restart: unless-stopped
    command: sh ./scripts/entrypoint.sh
    volumes:
      - .:/app
    labels:
      - "traefik.enable=true"
      - "traefik.http.routers.pickle.rule=Host(`${DOMAIN}`)"
      - "traefik.http.routers.pickle.entrypoints=websecure"
      - "traefik.http.routers.pickle.tls.certresolver=letsencrypt"
      - "traefik.http.services.pickle.loadbalancer.server.port=8000"
    env_file:
      - .env
    depends_on:
      - db
      - redis
    networks:
      - web
      - default

  celery-worker:
    build: .
    restart: unless-stopped
    command: celery -A config worker --loglevel=info --concurrency=2
    volumes:
      - .:/app
    env_file:
      - .env
    depends_on:
      - db
      - redis
    networks:
      - default

  celery-beat:
    build: .
    restart: unless-stopped
    command: celery -A config beat --loglevel=info
    volumes:
      - .:/app
    env_file:
      - .env
    depends_on:
      - db
      - redis
    networks:
      - default

networks:
  web:
    external: true

volumes:
  db:
