{% extends 'base.html' %}

{% block title %}Expenses{% endblock %}

{% block content %}
<div class="container-fluid py-4" style="max-width: 1200px;">

    <!-- Add Expense button -->
    <div class="row mb-4 g-2">
        <div class="col-12">
            <button class="btn btn-primary btn-lg w-100 py-3" data-bs-toggle="modal" data-bs-target="#addExpenseModal">
                <i class="bi bi-plus-circle me-1"></i> Add Expense
            </button>
        </div>
    </div>

    <!-- Totals -->
    <div class="row mb-4 g-3">
        <div class="col-md-4">
            <div class="card h-100 border-0 shadow-sm">
                <div class="card-body text-center py-3">
                    <div class="text-muted small mb-1">Total Expenses</div>
                    <div class="fs-4 fw-bold text-danger" id="total-expenses">&mdash;</div>
                </div>
            </div>
        </div>
        <div class="col-md-4">
            <div class="card h-100 border-0 shadow-sm">
                <div class="card-body text-center py-3">
                    <div class="text-muted small mb-1">Total Income (NET)</div>
                    <div class="fs-4 fw-bold text-success" id="total-income">&mdash;</div>
                </div>
            </div>
        </div>
        <div class="col-md-4">
            <div class="card h-100 border-0 shadow-sm">
                <div class="card-body text-center py-3">
                    <div class="text-muted small mb-1">Total</div>
                    <div class="fs-4 fw-bold" id="total-balance">&mdash;</div>
                </div>
            </div>
        </div>
    </div>

    <!-- Filters -->
    <div class="card border-0 shadow-sm mb-4">
        <div class="card-body">
            <div class="row g-2 align-items-end">
                <div class="col-md-4 position-relative">
                    <label class="form-label small text-muted mb-1">Search</label>
                    <input type="text" id="filter-q" class="form-control" placeholder="Search by expense or user..." autocomplete="off">
                    <div id="search-results" class="list-group position-absolute shadow" style="z-index:100; display:none; max-height:250px; overflow-y:auto; width:calc(100% - 24px);"></div>
                </div>
                <div class="col-md-3">
                    <label class="form-label small text-muted mb-1">From</label>
                    <input type="date" id="filter-from" class="form-control" value="{{ default_from }}">
                </div>
                <div class="col-md-3">
                    <label class="form-label small text-muted mb-1">To</label>
                    <input type="date" id="filter-to" class="form-control" value="{{ default_to }}">
                </div>
                <div class="col-md-2 d-flex gap-2">
                    <button id="btn-filter" class="btn btn-primary flex-fill">
                        <i class="bi bi-funnel"></i> Filter
                    </button>
                    <button id="btn-clear" class="btn btn-outline-secondary flex-fill">Clear</button>
                </div>
            </div>
        </div>
    </div>

    <!-- Table -->
    <div class="card border-0 shadow-sm">
        <div class="card-header bg-transparent border-bottom d-flex justify-content-between align-items-center py-3">
            <span class="fw-semibold">Expenses</span>
            <small class="text-muted" id="entries-count"></small>
        </div>
        <div class="card-body p-0">
            <div class="table-responsive">
                <table class="table table-hover align-middle mb-0">
                    <thead class="table-dark">
                        <tr>
                            <th class="ps-3">Date</th>
                            <th>Expense</th>
                            <th>User</th>
                            <th>Notes</th>
                            <th class="text-end pe-4">Amount</th>
                            <th class="pe-3"></th>
                        </tr>
                    </thead>
                    <tbody id="history-body">
                        <tr>
                            <td colspan="6" class="text-center text-muted py-4">
                                <div class="spinner-border spinner-border-sm me-2" role="status"></div>Loading...
                            </td>
                        </tr>
                    </tbody>
                </table>
            </div>
        </div>
        <!-- Pagination -->
        <div class="card-footer bg-transparent d-none d-flex justify-content-between align-items-center py-2" id="pagination-footer">
            <small class="text-muted" id="pagination-info"></small>
            <div class="d-flex gap-2">
                <button class="btn btn-sm btn-outline-secondary" id="btn-prev" disabled>&laquo; Prev</button>
                <button class="btn btn-sm btn-outline-secondary" id="btn-next" disabled>Next &raquo;</button>
            </div>
        </div>
    </div>

</div>

<!-- Add Expense Modal -->
<div class="modal fade" id="addExpenseModal" tabindex="-1">
    <div class="modal-dialog">
        <div class="modal-content">
            <div class="modal-header">
                <h5 class="modal-title">Add Expense</h5>
                <button type="button" class="btn-close" data-bs-dismiss="modal"></button>
            </div>
            <div class="modal-body">
                <div class="mb-3">
                    <label class="form-label">Expense *</label>
                    <input type="text" id="new-expense" class="form-control" placeholder="e.g. Server hosting" required>
                </div>
                <div class="mb-3">
                    <label class="form-label">Amount *</label>
                    <input type="number" id="new-amount" class="form-control" step="0.01" placeholder="0.00" required>
                </div>
                <div class="mb-3">
                    <label class="form-label">Notes</label>
                    <textarea id="new-notes" class="form-control" rows="3" placeholder="Optional notes..."></textarea>
                </div>
            </div>
            <div class="modal-footer">
                <button type="button" class="btn btn-secondary" data-bs-dismiss="modal">Cancel</button>
                <button type="button" class="btn btn-primary" id="btn-save-expense">Save Expense</button>
            </div>
        </div>
    </div>
</div>

{% endblock %}

{% block extra_js %}
<script>
function getCsrf() {
    return document.cookie.split('; ')
        .find(c => c.startsWith('csrftoken='))?.split('=')[1] || '';
}

// ── Search autocomplete ─────────────────────────────────────────────────────
var searchTimer = null;
var filterInput = document.getElementById('filter-q');
var searchResults = document.getElementById('search-results');

filterInput.addEventListener('input', function () {
    clearTimeout(searchTimer);
    var q = this.value.trim();
    if (q.length < 1) { searchResults.style.display = 'none'; return; }
    searchTimer = setTimeout(function () {
        fetch('/expenses/search/?q=' + encodeURIComponent(q))
            .then(r => r.json())
            .then(data => {
                searchResults.innerHTML = '';
                if (!data.results.length) {
                    searchResults.innerHTML = '<div class="list-group-item text-muted">No matches</div>';
                    searchResults.style.display = '';
                    return;
                }
                data.results.forEach(function (val) {
                    var item = document.createElement('a');
                    item.href = '#';
                    item.className = 'list-group-item list-group-item-action py-2';
                    item.textContent = val;
                    item.addEventListener('click', function (e) {
                        e.preventDefault();
                        filterInput.value = val;
                        searchResults.style.display = 'none';
                    });
                    searchResults.appendChild(item);
                });
                searchResults.style.display = '';
            });
    }, 250);
});

document.addEventListener('click', function (e) {
    if (!filterInput.contains(e.target) && !searchResults.contains(e.target))
        searchResults.style.display = 'none';
});

// ── Load history ────────────────────────────────────────────────────────────
var currentPage = 1;

function loadHistory(params) {
    params = params || {};
    if (!params.page) params.page = 1;
    currentPage = parseInt(params.page);
    window._lastParams = params;
    var qs = new URLSearchParams(params).toString();
    document.getElementById('history-body').innerHTML =
        '<tr><td colspan="6" class="text-center text-muted py-4"><div class="spinner-border spinner-border-sm me-2" role="status"></div>Loading...</td></tr>';

    fetch('/expenses/history/' + (qs ? '?' + qs : ''))
        .then(r => r.json())
        .then(function (data) {
            var totalExp = parseFloat(data.total_expenses) || 0;
            var totalInc = parseFloat(data.total_income) || 0;
            var totalBal = totalInc - totalExp;
            document.getElementById('total-expenses').textContent = totalExp.toFixed(2);
            document.getElementById('total-income').textContent = totalInc.toFixed(2);
            var balEl = document.getElementById('total-balance');
            balEl.textContent = totalBal.toFixed(2);
            balEl.className = 'fs-4 fw-bold ' + (totalBal >= 0 ? 'text-success' : 'text-danger');

            var tbody = document.getElementById('history-body');
            var pg = data.pagination;
            document.getElementById('entries-count').textContent = pg.total_count + ' record' + (pg.total_count !== 1 ? 's' : '');

            if (!data.entries.length) {
                tbody.innerHTML = '<tr><td colspan="6" class="text-center text-muted py-4">No expenses found</td></tr>';
                document.getElementById('pagination-footer').classList.add('d-none');
                return;
            }
            tbody.innerHTML = '';
            data.entries.forEach(function (e) {
                var tr = document.createElement('tr');
                var notesPreview = e.notes ? (e.notes.length > 40 ? e.notes.substring(0, 40) + '...' : e.notes) : '&mdash;';
                tr.innerHTML =
                    '<td class="ps-3 text-nowrap text-muted small">' + e.created_at + '</td>' +
                    '<td class="fw-semibold">' + e.expense + '</td>' +
                    '<td class="text-muted">' + e.created_by + '</td>' +
                    '<td class="text-muted small">' + notesPreview + '</td>' +
                    '<td class="text-end pe-4"><span class="text-danger fw-semibold">' + e.amount + '</span></td>' +
                    '<td class="pe-3 text-end"><a href="/expenses/' + e.id + '/" class="btn btn-sm btn-outline-primary">View</a></td>';
                tbody.appendChild(tr);
            });

            // Pagination
            var footer = document.getElementById('pagination-footer');
            if (pg.total_pages > 1) {
                footer.classList.remove('d-none');
                var start = (pg.page - 1) * 25 + 1;
                var end = Math.min(pg.page * 25, pg.total_count);
                document.getElementById('pagination-info').textContent = 'Showing ' + start + '–' + end + ' of ' + pg.total_count;
                document.getElementById('btn-prev').disabled = (pg.page <= 1);
                document.getElementById('btn-next').disabled = (pg.page >= pg.total_pages);
            } else {
                footer.classList.add('d-none');
            }
        });
}

// ── Pagination buttons ──────────────────────────────────────────────────────
document.getElementById('btn-prev').addEventListener('click', function () {
    if (currentPage > 1) {
        var params = Object.assign({}, window._lastParams);
        params.page = currentPage - 1;
        loadHistory(params);
    }
});
document.getElementById('btn-next').addEventListener('click', function () {
    var params = Object.assign({}, window._lastParams);
    params.page = currentPage + 1;
    loadHistory(params);
});

// ── Filter / Clear ──────────────────────────────────────────────────────────
document.getElementById('btn-filter').addEventListener('click', function () {
    var params = {};
    var q = filterInput.value.trim();
    if (q) params.q = q;
    var from = document.getElementById('filter-from').value;
    var to = document.getElementById('filter-to').value;
    if (from) params.date_from = from;
    if (to) params.date_to = to;
    params.page = 1;
    loadHistory(params);
});

document.getElementById('btn-clear').addEventListener('click', function () {
    filterInput.value = '';
    document.getElementById('filter-from').value = '';
    document.getElementById('filter-to').value = '';
    loadHistory();
});

// ── Add Expense ─────────────────────────────────────────────────────────────
document.getElementById('btn-save-expense').addEventListener('click', function () {
    var expense = document.getElementById('new-expense').value.trim();
    var amount = document.getElementById('new-amount').value.trim();
    var notes = document.getElementById('new-notes').value.trim();
    if (!expense || !amount) return;
    this.disabled = true;
    fetch('/expenses/create/', {
        method: 'POST',
        headers: { 'Content-Type': 'application/json', 'X-CSRFToken': getCsrf() },
        body: JSON.stringify({ expense: expense, amount: parseFloat(amount), notes: notes }),
    })
    .then(r => r.json())
    .then(function (data) {
        if (data.ok) {
            bootstrap.Modal.getInstance(document.getElementById('addExpenseModal')).hide();
            document.getElementById('new-expense').value = '';
            document.getElementById('new-amount').value = '';
            document.getElementById('new-notes').value = '';
            loadHistory(window._lastParams || {});
        }
        document.getElementById('btn-save-expense').disabled = false;
    })
    .catch(function () { document.getElementById('btn-save-expense').disabled = false; });
});

// ── Load on page ready ──────────────────────────────────────────────────────
loadHistory({ date_from: '{{ default_from }}', date_to: '{{ default_to }}' });
</script>
{% endblock %}
