{% extends 'base.html' %}
{% block title %}Order{% endblock %}

{% block content %}
<div class="container py-4" style="max-width: 560px;">

    <h4 class="mb-4 fw-semibold"><i class="bi bi-inbox me-2"></i>Order</h4>

    <!-- Account search -->
    <div class="card border-0 shadow-sm mb-3" id="search-card">
        <div class="card-body position-relative">
            <label class="form-label text-muted small mb-1">Search account</label>
            <input type="text" id="account-search" class="form-control form-control-lg"
                   placeholder="Type nickname or API key..." autocomplete="off">
            <div id="search-results" class="list-group position-absolute shadow"
                 style="z-index:100; display:none; max-height:280px; overflow-y:auto;
                        left:1rem; right:1rem;"></div>
        </div>
    </div>

    <!-- Selected account card -->
    <div id="account-card" style="display:none;">
        <div class="card border-0 shadow-sm mb-3">
            <div class="card-body">
                <div class="d-flex justify-content-between align-items-start mb-3">
                    <div>
                        <h5 class="mb-0 fw-semibold" id="card-nick"></h5>
                        <span class="text-muted small" id="card-platform"></span>
                    </div>
                    <button class="btn btn-sm btn-outline-secondary" id="btn-change">
                        <i class="bi bi-arrow-left"></i> Change
                    </button>
                </div>
                <div class="d-flex gap-2">
                    <button class="btn btn-danger flex-fill py-2" id="btn-deposit">
                        <i class="bi bi-arrow-down-circle me-1"></i> Deposit
                    </button>
                    <button class="btn btn-success flex-fill py-2" id="btn-withdraw">
                        <i class="bi bi-arrow-up-circle me-1"></i> Withdrawal
                    </button>
                </div>
            </div>
        </div>
    </div>

</div>
{% endblock %}

{% block extra_js %}
<script>
var selectedAccountId = null;
var searchTimer = null;
var searchInput = document.getElementById('account-search');
var resultsDiv = document.getElementById('search-results');

// ── Account search (eligible accounts only) ─────────────────────────────────
searchInput.addEventListener('input', function () {
    clearTimeout(searchTimer);
    var q = this.value.trim();
    if (q.length < 1) { resultsDiv.style.display = 'none'; return; }

    searchTimer = setTimeout(function () {
        fetch('/account-search/?eligible=1&q=' + encodeURIComponent(q))
            .then(r => r.json())
            .then(function (data) {
                resultsDiv.innerHTML = '';
                if (!data.results.length) {
                    resultsDiv.innerHTML = '<div class="list-group-item text-muted py-2">No accounts found</div>';
                    resultsDiv.style.display = '';
                    return;
                }
                data.results.forEach(function (acc) {
                    var item = document.createElement('a');
                    item.href = '#';
                    item.className = 'list-group-item list-group-item-action py-2';
                    item.textContent = acc.nick + (acc.platform ? '  (' + acc.platform + ')' : '');
                    item.addEventListener('click', function (e) {
                        e.preventDefault();
                        selectAccount(acc);
                    });
                    resultsDiv.appendChild(item);
                });
                resultsDiv.style.display = '';
            });
    }, 250);
});

document.addEventListener('click', function (e) {
    if (!searchInput.contains(e.target) && !resultsDiv.contains(e.target))
        resultsDiv.style.display = 'none';
});

// ── Select / Change account ─────────────────────────────────────────────────
function selectAccount(acc) {
    selectedAccountId = acc.id;
    document.getElementById('card-nick').textContent = acc.nick;
    document.getElementById('card-platform').textContent = acc.platform || '';
    document.getElementById('account-card').style.display = '';
    document.getElementById('search-card').style.display = 'none';
    searchInput.value = '';
    resultsDiv.style.display = 'none';
}

document.getElementById('btn-change').addEventListener('click', function () {
    selectedAccountId = null;
    document.getElementById('account-card').style.display = 'none';
    document.getElementById('search-card').style.display = '';
    searchInput.focus();
});

// ── Navigate to order pages ──────────────────────────────────────────────────
document.getElementById('btn-deposit').addEventListener('click', function () {
    window.location.href = '/deposit-withdrawal/order/deposit/' + selectedAccountId + '/';
});
document.getElementById('btn-withdraw').addEventListener('click', function () {
    window.location.href = '/deposit-withdrawal/order/withdrawal/' + selectedAccountId + '/';
});
</script>
{% endblock %}
