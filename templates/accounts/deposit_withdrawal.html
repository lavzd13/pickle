{% extends 'base.html' %}

{% block title %}Order{% endblock %}

{% block content %}
<div class="container py-4" style="max-width: 560px;">

    <h4 class="mb-4 fw-semibold"><i class="bi bi-inbox me-2"></i>Order</h4>

    <!-- Account search -->
    <div class="card border-0 shadow-sm mb-3" id="search-card">
        <div class="card-body position-relative">
            <label class="form-label text-muted small mb-1">Search account</label>
            <input type="text" id="account-search" class="form-control form-control-lg"
                   placeholder="Type nickname or API key..." autocomplete="off">
            <div id="search-results" class="list-group position-absolute shadow"
                 style="z-index:100; display:none; max-height:280px; overflow-y:auto;
                        left:1rem; right:1rem;"></div>
        </div>
    </div>

    <!-- Selected account card -->
    <div id="account-card" style="display:none;">
        <div class="card border-0 shadow-sm mb-3">
            <div class="card-body">
                <div class="d-flex justify-content-between align-items-start mb-3">
                    <div>
                        <h5 class="mb-0 fw-semibold" id="card-nick"></h5>
                        <span class="text-muted small" id="card-platform"></span>
                    </div>
                    <button class="btn btn-sm btn-outline-secondary" id="btn-change">
                        <i class="bi bi-arrow-left"></i> Change
                    </button>
                </div>
                <div class="d-flex gap-2">
                    <button class="btn btn-danger flex-fill py-2" id="btn-deposit">
                        <i class="bi bi-arrow-down-circle me-1"></i> Deposit
                    </button>
                    <button class="btn btn-success flex-fill py-2" id="btn-withdraw">
                        <i class="bi bi-arrow-up-circle me-1"></i> Withdrawal
                    </button>
                </div>
                <div id="form-success" class="alert alert-success mt-3 mb-0 py-2" style="display:none;"></div>
            </div>
        </div>
    </div>

</div>

<!-- Order modal -->
<div class="modal fade" id="order-modal" tabindex="-1">
    <div class="modal-dialog modal-dialog-centered">
        <div class="modal-content border-0 shadow">
            <div class="modal-header border-bottom-0 pb-2">
                <h5 class="modal-title fw-semibold" id="modal-title">Order</h5>
                <button type="button" class="btn-close" data-bs-dismiss="modal"></button>
            </div>
            <div class="modal-body pt-0">

                <!-- Deposit-only fields -->
                <div id="deposit-fields">
                    <div class="mb-3">
                        <label class="form-label text-muted small">Network</label>
                        <select id="modal-network" class="form-select">
                            <option value="">— Select network —</option>
                            {% for n in networks %}
                            <option value="{{ n.id }}">{{ n.name }}</option>
                            {% endfor %}
                        </select>
                    </div>
                    <div class="mb-3">
                        <label class="form-label text-muted small">Wallet Address</label>
                        <input type="text" id="modal-wallet-address" class="form-control"
                               placeholder="0xN13Bvsd...">
                    </div>
                </div>

                <!-- Shared: Current Balance -->
                <div class="mb-3">
                    <label class="form-label text-muted small" id="balance-label">Current Balance</label>
                    <input type="number" id="modal-balance" class="form-control"
                           step="0.01" min="0" placeholder="0.00">
                </div>

                <div id="modal-error" class="alert alert-danger py-2 mb-0" style="display:none;"></div>
            </div>
            <div class="modal-footer border-top-0 pt-0">
                <button type="button" class="btn btn-outline-secondary" data-bs-dismiss="modal">Cancel</button>
                <button type="button" class="btn btn-primary px-4" id="modal-confirm">Submit</button>
            </div>
        </div>
    </div>
</div>
{% endblock %}

{% block extra_js %}
<script>
function getCsrf() {
    return document.cookie.split('; ')
        .find(c => c.startsWith('csrftoken='))?.split('=')[1] || '';
}

var selectedAccountId = null;
var currentAction = null;
var searchTimer = null;
var searchInput = document.getElementById('account-search');
var resultsDiv = document.getElementById('search-results');
var orderModal = new bootstrap.Modal(document.getElementById('order-modal'));

// ── Account search (eligible accounts only) ─────────────────────────────────
searchInput.addEventListener('input', function () {
    clearTimeout(searchTimer);
    var q = this.value.trim();
    if (q.length < 1) { resultsDiv.style.display = 'none'; return; }

    searchTimer = setTimeout(function () {
        fetch('/account-search/?eligible=1&q=' + encodeURIComponent(q))
            .then(r => r.json())
            .then(function (data) {
                resultsDiv.innerHTML = '';
                if (!data.results.length) {
                    resultsDiv.innerHTML = '<div class="list-group-item text-muted py-2">No accounts found</div>';
                    resultsDiv.style.display = '';
                    return;
                }
                data.results.forEach(function (acc) {
                    var item = document.createElement('a');
                    item.href = '#';
                    item.className = 'list-group-item list-group-item-action py-2';
                    item.textContent = acc.nick + (acc.platform ? '  (' + acc.platform + ')' : '');
                    item.addEventListener('click', function (e) {
                        e.preventDefault();
                        selectAccount(acc);
                    });
                    resultsDiv.appendChild(item);
                });
                resultsDiv.style.display = '';
            });
    }, 250);
});

document.addEventListener('click', function (e) {
    if (!searchInput.contains(e.target) && !resultsDiv.contains(e.target))
        resultsDiv.style.display = 'none';
});

// ── Select / Change account ─────────────────────────────────────────────────
function selectAccount(acc) {
    selectedAccountId = acc.id;
    document.getElementById('card-nick').textContent = acc.nick;
    document.getElementById('card-platform').textContent = acc.platform || '';
    document.getElementById('account-card').style.display = '';
    document.getElementById('search-card').style.display = 'none';
    document.getElementById('form-success').style.display = 'none';
    searchInput.value = '';
    resultsDiv.style.display = 'none';
}

document.getElementById('btn-change').addEventListener('click', function () {
    selectedAccountId = null;
    document.getElementById('account-card').style.display = 'none';
    document.getElementById('search-card').style.display = '';
    searchInput.focus();
});

// ── Open modal ──────────────────────────────────────────────────────────────
document.getElementById('btn-deposit').addEventListener('click', function () {
    openModal('deposit');
});
document.getElementById('btn-withdraw').addEventListener('click', function () {
    openModal('withdrawal');
});

function openModal(action) {
    currentAction = action;
    var isDeposit = action === 'deposit';

    document.getElementById('modal-title').textContent = isDeposit ? 'Deposit Order' : 'Withdrawal Order';
    document.getElementById('modal-confirm').className = 'btn px-4 ' + (isDeposit ? 'btn-danger' : 'btn-success');
    document.getElementById('deposit-fields').style.display = isDeposit ? '' : 'none';
    document.getElementById('balance-label').textContent = isDeposit ? 'Current Balance' : 'Current Balance';

    document.getElementById('modal-network').value = '';
    document.getElementById('modal-wallet-address').value = '';
    document.getElementById('modal-balance').value = '';
    document.getElementById('modal-error').style.display = 'none';

    orderModal.show();
    setTimeout(function () { document.getElementById('modal-balance').focus(); }, 350);
}

// ── Submit ──────────────────────────────────────────────────────────────────
document.getElementById('modal-confirm').addEventListener('click', submitOrder);

function submitOrder() {
    var errDiv = document.getElementById('modal-error');
    errDiv.style.display = 'none';

    var balance = document.getElementById('modal-balance').value;
    if (!balance || parseFloat(balance) < 0) {
        errDiv.textContent = 'Enter a valid balance';
        errDiv.style.display = '';
        return;
    }

    var url = currentAction === 'deposit' ? '/deposit-order/create/' : '/withdrawal-order/create/';
    var body = {
        account_id: selectedAccountId,
        current_balance: parseFloat(balance),
    };

    if (currentAction === 'deposit') {
        var networkId = document.getElementById('modal-network').value;
        body.network_id = networkId ? parseInt(networkId) : null;
        body.wallet_address = document.getElementById('modal-wallet-address').value.trim();
    }

    document.getElementById('modal-confirm').disabled = true;

    fetch(url, {
        method: 'POST',
        headers: { 'Content-Type': 'application/json', 'X-CSRFToken': getCsrf() },
        body: JSON.stringify(body),
    })
    .then(r => r.json())
    .then(function (data) {
        document.getElementById('modal-confirm').disabled = false;
        if (data.error) { errDiv.textContent = data.error; errDiv.style.display = ''; return; }
        orderModal.hide();
        var successDiv = document.getElementById('form-success');
        successDiv.textContent = (currentAction === 'deposit' ? 'Deposit' : 'Withdrawal') +
            ' order submitted for ' + data.account + '.';
        successDiv.style.display = '';
        setTimeout(function () { successDiv.style.display = 'none'; }, 6000);
    })
    .catch(function () {
        document.getElementById('modal-confirm').disabled = false;
        errDiv.textContent = 'An error occurred. Please try again.';
        errDiv.style.display = '';
    });
}
</script>
{% endblock %}
