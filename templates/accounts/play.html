{% extends 'base.html' %}

{% block title %}Play{% endblock %}

{% block content %}
<div class="container py-4" style="max-width: 560px;">

    <!-- Top action button -->
    <div class="text-center mb-4">
        <button id="btn-play" class="btn btn-primary btn-lg" style="font-size: 2rem; padding: 1.2rem 3rem;">
            PLAY
        </button>
        <div id="no-accounts-msg" class="alert alert-warning mt-3" style="display:none;">
            <i class="bi bi-calendar-x"></i> No eligible accounts available right now.
        </div>
        <div id="on-break-msg" class="alert alert-info mt-3" style="display:none;">
            <i class="bi bi-clock-history"></i> Accounts are on break right now. Try again in <strong id="break-minutes-left"></strong> min.
        </div>
    </div>

    <!-- Active session cards injected here -->
    <div id="session-list"></div>

</div>

<!-- Session card template (hidden) -->
<template id="session-card-tpl">
    <div class="card shadow mb-3 session-card">
        <div class="card-body">
            {% if user.is_superuser %}
            <p class="card-created-by mb-2" style="display:none; font-size:1.3rem; color:#555;"></p>
            {% endif %}
            <div class="d-flex justify-content-between align-items-center mb-2" style="position: relative;">
                <div>
                    <h5 class="card-title fw-bold mb-0"><span class="card-nick"></span></h5>
                </div>
                <div class="card-last-session-wrapper" style="display:none; position: absolute; left: 50%; transform: translateX(-50%);">
                    <span class="badge bg-warning text-dark" style="font-size:0.95rem; padding:0.4em 1em; letter-spacing:0.03em; white-space:nowrap;">Last Session</span>
                </div>
                <div class="d-flex gap-2 align-items-center">
                    <span class="badge bg-secondary card-status" style="font-size:0.95rem; padding: 0.4em 0.75em;">Pending</span>
                    <button class="btn btn-sm btn-outline-danger card-quit-btn" title="Quit session">
                        <i class="bi bi-x-lg"></i>
                    </button>
                </div>
            </div>
            <div class="mb-2" style="font-size:0.9rem;">
                <div><span class="text-muted">Device name:</span> <span class="card-device-name"></span></div>
                <div><span class="text-muted">Platform:</span> <span class="card-platform"></span></div>
                <div><span class="text-muted">Phone:</span> <span class="card-phone"></span></div>
                <div><span class="text-muted">Withdraw Pass:</span> <span class="card-withdraw-pass"></span></div>
                <div><span class="text-muted">Minimum Balance for Withdrawal:</span> $<span class="card-min-balance"></span></div>
            </div>
            <div class="card-pending-section">
                <p class="text-muted mb-1">Duration: <strong class="card-duration"></strong> min</p>
                <p class="text-muted mb-2" style="font-size:0.85rem;">Remaining today: <strong class="card-remaining"></strong> min</p>
                <p class="text-danger mb-2" style="font-size:0.8rem;"><i class="bi bi-clock"></i> Expires in <span class="card-pending-expire-time">20:00</span></p>
                <button class="btn btn-success card-start-btn" style="font-size:1.1rem; padding: 0.5rem 1.5rem;">
                    <i class="bi bi-play-fill"></i> Start Session
                </button>
            </div>
            <div class="card-running-section" style="display:none;">
                <div class="d-flex align-items-center gap-3 mb-2">
                    <div class="display-6 fw-bold card-timer">--:--</div>
                    <div>
                        <small class="text-muted d-block">ends at <span class="card-end-time"></span></small>
                        <small class="card-remaining-after text-muted" style="display:none;"></small>
                    </div>
                </div>
                <div class="d-flex gap-2">
                    <button class="btn btn-warning btn-sm card-pause-btn">
                        <i class="bi bi-pause-fill"></i> Pause
                    </button>
                    <button class="btn btn-success btn-sm card-resume-btn" style="display:none;">
                        <i class="bi bi-play-fill"></i> Resume
                    </button>
                    <button class="btn btn-danger btn-sm card-stop-btn">
                        <i class="bi bi-stop-fill"></i> Stop
                    </button>
                </div>
            </div>
            <div class="card-timeup-section mt-2" style="display:none;">
                <div class="alert alert-warning d-flex align-items-center justify-content-between mb-2 py-2">
                    <span><i class="bi bi-alarm-fill"></i> <strong>Time's up!</strong> Click Stop when you're done.</span>
                </div>
                <button class="btn btn-danger card-timeup-stop-btn w-100">
                    <i class="bi bi-stop-fill"></i> Stop Session
                </button>
            </div>
            <div class="card-done-section mt-2" style="display:none;">
                <div class="badge bg-danger card-last-session-done-badge mb-1 d-none" style="width:100%; font-size:0.85rem; padding:0.4em 0.6em;">Last session done</div>
                <div class="alert alert-success d-flex align-items-center justify-content-between mb-0 py-2">
                    <span>
                        <i class="bi bi-check-circle-fill"></i> <strong>Session complete!</strong>
                        <small class="card-done-remaining d-block mt-1 text-muted"></small>
                    </span>
                    <button class="btn btn-sm btn-success card-done-btn ms-2">Done</button>
                </div>
            </div>
        </div>
    </div>
</template>
{% endblock %}

{% block extra_js %}
<script>
(function () {
    var displayedAccountIds = new Set();
    // Map server session_id → card element for cross-client sync
    var cardBySessionId = {};

    function updatePlayButton() {
        var count = document.querySelectorAll('#session-list .session-card').length;
        var btn = document.getElementById('btn-play');
        if (count === 0) {
            btn.innerHTML = 'PLAY';
            btn.classList.remove('btn-outline-primary');
            btn.classList.add('btn-primary');
            btn.style.fontSize = '2rem';
            btn.style.padding = '1.2rem 3rem';
        } else {
            btn.innerHTML = '<i class="bi bi-plus-circle"></i> Add One More Session';
            btn.classList.remove('btn-primary');
            btn.classList.add('btn-outline-primary');
            btn.style.fontSize = '1rem';
            btn.style.padding = '0.5rem 1.5rem';
        }
    }

    function sortSessionCards() {
        var list = document.getElementById('session-list');
        var cards = Array.from(list.querySelectorAll('.session-card'));
        cards.sort(function (a, b) {
            var pa = parseInt(a.dataset.sortPriority || '4');
            var pb = parseInt(b.dataset.sortPriority || '4');
            if (pa !== pb) return pa - pb;
            return parseInt(a.dataset.endMs || '0') - parseInt(b.dataset.endMs || '0');
        });
        cards.forEach(function (c) { list.appendChild(c); });
    }

    function markLastSession(card) {
        var wrapper = card.querySelector('.card-last-session-wrapper');
        if (wrapper) wrapper.style.display = 'block';
    }

    function markLastSessionDone(card) {
        card.style.borderColor = '#dc3545';
        card.style.borderWidth = '3px';
        card.style.borderStyle = 'solid';
        var badge = card.querySelector('.card-last-session-done-badge');
        if (badge) badge.classList.remove('d-none');
    }

    function startPendingCountdown(card, expiresAtMs, pendingSessionId) {
        var expireEl = card.querySelector('.card-pending-expire-time');
        card._pendingInterval = setInterval(function () {
            var left = Math.max(0, Math.round((expiresAtMs - Date.now()) / 1000));
            var m = Math.floor(left / 60);
            var s = left % 60;
            expireEl.textContent = m + ':' + String(s).padStart(2, '0');
            if (left <= 0) {
                clearInterval(card._pendingInterval);
                displayedAccountIds.delete(parseInt(card.dataset.accountId));
                if (pendingSessionId) delete cardBySessionId[pendingSessionId];
                card.remove();
                updatePlayButton();
                if (pendingSessionId) {
                    fetch('/play/cancel-pending/', {
                        method: 'POST',
                        headers: { 'Content-Type': 'application/json', 'X-CSRFToken': getCsrf() },
                        body: JSON.stringify({ session_id: pendingSessionId }),
                    }).catch(function () {});
                }
            }
        }, 1000);
    }

    function getCsrf() {
        return document.cookie.split(';').map(c => c.trim())
            .find(c => c.startsWith('csrftoken='))?.split('=')[1] || '';
    }

    function hideNoAccounts() {
        document.getElementById('no-accounts-msg').style.display = 'none';
        document.getElementById('on-break-msg').style.display = 'none';
    }

    function showNoAccounts() {
        document.getElementById('no-accounts-msg').style.display = 'block';
        document.getElementById('on-break-msg').style.display = 'none';
    }

    function showOnBreak(minutesLeft) {
        document.getElementById('break-minutes-left').textContent = minutesLeft;
        document.getElementById('on-break-msg').style.display = 'block';
        document.getElementById('no-accounts-msg').style.display = 'none';
    }

    function fetchAndAddSession() {
        hideNoAccounts();
        var excluded = Array.from(displayedAccountIds).join(',');
        var url = '/play/eligible-account/' + (excluded ? '?excluded=' + excluded : '');
        fetch(url)
            .then(r => r.json())
            .then(function (data) {
                if (!data.eligible) {
                    if (data.on_break) { showOnBreak(data.minutes_left); }
                    else { showNoAccounts(); }
                    return;
                }
                addSessionCard(data.account, data.duration_minutes, data.remaining_minutes, null, data.session_id);
            })
            .catch(showNoAccounts);
    }

    function addSessionCard(account, durationMinutes, remainingMinutes, expiresAtMs, pendingSessionId) {
        displayedAccountIds.add(account.id);

        var tpl = document.getElementById('session-card-tpl');
        var card = tpl.content.cloneNode(true).querySelector('.session-card');
        card.dataset.accountId = account.id;
        card.dataset.sortPriority = '3';
        var sessionId = pendingSessionId || null;
        var isPending = true;

        if (sessionId) cardBySessionId[sessionId] = card;

        card.querySelector('.card-nick').textContent = account.nick;
        card.querySelector('.card-device-name').textContent = account.device_name || '-';
        card.querySelector('.card-platform').textContent = account.platform || '-';
        card.querySelector('.card-phone').textContent = account.phone || '-';
        card.querySelector('.card-withdraw-pass').textContent = account.withdraw_pass || '-';
        card.querySelector('.card-min-balance').textContent = account.min_balance || '0.00';
        card.querySelector('.card-duration').textContent = durationMinutes;
        card.querySelector('.card-remaining').textContent = remainingMinutes;

        startPendingCountdown(card, expiresAtMs || (Date.now() + 20 * 60 * 1000), sessionId);

        card.querySelector('.card-quit-btn').addEventListener('click', function () {
            clearInterval(card._pendingInterval);
            displayedAccountIds.delete(account.id);
            if (sessionId) delete cardBySessionId[sessionId];
            if (!isPending && sessionId) {
                fetch('/play/finish-session/', {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json', 'X-CSRFToken': getCsrf() },
                    body: JSON.stringify({ session_id: sessionId }),
                }).finally(function () { card.remove(); updatePlayButton(); });
            } else if (sessionId) {
                fetch('/play/cancel-pending/', {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json', 'X-CSRFToken': getCsrf() },
                    body: JSON.stringify({ session_id: sessionId }),
                }).finally(function () { card.remove(); updatePlayButton(); });
            } else {
                card.remove();
                updatePlayButton();
            }
        });

        card.querySelector('.card-start-btn').addEventListener('click', function () {
            clearInterval(card._pendingInterval);
            card.querySelector('.card-start-btn').disabled = true;
            card.querySelector('.card-status').textContent = 'Starting...';

            fetch('/play/start-session/', {
                method: 'POST',
                headers: { 'Content-Type': 'application/json', 'X-CSRFToken': getCsrf() },
                body: JSON.stringify({ session_id: sessionId, duration_minutes: durationMinutes }),
            })
            .then(r => r.json())
            .then(function (data) {
                sessionId = data.session_id;
                isPending = false;
                cardBySessionId[sessionId] = card;
                card.querySelector('.card-pending-section').style.display = 'none';
                card.querySelector('.card-running-section').style.display = 'block';
                card.querySelector('.card-status').textContent = 'Playing';
                card.querySelector('.card-status').className = 'badge bg-success card-status';
                card.querySelector('.card-quit-btn').style.display = 'none';
                card.style.backgroundColor = '#d1f5d3';
                card.style.borderColor = '#6dbb74';
                const endDate = new Date(Date.now() + durationMinutes * 60000);
                const hh = String(endDate.getHours()).padStart(2, '0');
                const mm = String(endDate.getMinutes()).padStart(2, '0');
                card.querySelector('.card-end-time').textContent = hh + ':' + mm;
                var remainingAfterEl = card.querySelector('.card-remaining-after');
                var remainingAfter = Math.max(0, remainingMinutes - durationMinutes);
                remainingAfterEl.textContent = 'After session: ' + remainingAfter + ' min remaining';
                remainingAfterEl.style.display = 'block';
                if (remainingAfter < 20) markLastSession(card);
                card.dataset.sortPriority = '4';
                card.dataset.endMs = String(Date.now() + durationMinutes * 60000);
                startCountdown(card, durationMinutes * 60, function () { onTimerExpired(card); });
                setupPauseResume(card, sessionId, account.id);
                sortSessionCards();
            });
        });

        document.getElementById('session-list').prepend(card);
        updatePlayButton();
    }

    // --- Web Worker timer (NOT throttled in background tabs) ---
    var workerBlob = new Blob([
        'var timers = {};',
        'setInterval(function() {',
        '  var now = Date.now();',
        '  for (var id in timers) {',
        '    if (timers[id].paused) continue;',
        '    var left = Math.round((timers[id].end - now) / 1000);',
        '    if (left <= 0) {',
        '      postMessage({ type: "done", id: id });',
        '      delete timers[id];',
        '    } else {',
        '      postMessage({ type: "tick", id: id, remaining: left });',
        '    }',
        '  }',
        '}, 1000);',
        'onmessage = function(e) {',
        '  var d = e.data;',
        '  if (d.cmd === "start") timers[d.id] = { end: d.endTimestamp, paused: false };',
        '  if (d.cmd === "pause") { if (timers[d.id]) timers[d.id].paused = true; }',
        '  if (d.cmd === "resume") { if (timers[d.id]) { timers[d.id].end = d.endTimestamp; timers[d.id].paused = false; } }',
        '  if (d.cmd === "stop") delete timers[d.id];',
        '};'
    ], { type: 'application/javascript' });
    var timerWorker = new Worker(URL.createObjectURL(workerBlob));

    var cardById = {};
    var nextTimerId = 1;

    timerWorker.onmessage = function (e) {
        var d = e.data;
        var card = cardById[d.id];
        if (!card || card._done) return;
        if (d.type === 'tick') {
            var timerEl = card.querySelector('.card-timer');
            var m = Math.floor(d.remaining / 60);
            var s = d.remaining % 60;
            timerEl.textContent = String(m).padStart(2, '0') + ':' + String(s).padStart(2, '0');
        } else if (d.type === 'done') {
            triggerDone(card);
        }
    };

    var runningCards = new Set();

    function triggerDone(card) {
        if (card._done) return;
        card._done = true;
        runningCards.delete(card);
        card.querySelector('.card-timer').textContent = '00:00';
        card._onDone();
    }

    function startCountdown(card, totalSeconds, onDone) {
        var timerId = String(nextTimerId++);
        card._timerId = timerId;
        card._endTimestamp = Date.now() + totalSeconds * 1000;
        card._onDone = onDone;
        card._paused = false;
        card._done = false;
        cardById[timerId] = card;
        runningCards.add(card);

        var m = Math.floor(totalSeconds / 60);
        var s = totalSeconds % 60;
        card.querySelector('.card-timer').textContent = String(m).padStart(2, '0') + ':' + String(s).padStart(2, '0');
        timerWorker.postMessage({ cmd: 'start', id: timerId, endTimestamp: card._endTimestamp });
    }

    function pauseCountdown(card) {
        card._paused = true;
        card._pausedSecondsLeft = Math.max(0, Math.round((card._endTimestamp - Date.now()) / 1000));
        runningCards.delete(card);
        if (card._timerId) timerWorker.postMessage({ cmd: 'pause', id: card._timerId });
    }

    function resumeCountdown(card, secondsLeft) {
        var secs = secondsLeft != null ? secondsLeft : card._pausedSecondsLeft;
        card._paused = false;
        card._done = false;
        if (card._timerId) {
            // Timer was previously started — resume it with updated end time
            card._endTimestamp = Date.now() + secs * 1000;
            runningCards.add(card);
            timerWorker.postMessage({ cmd: 'resume', id: card._timerId, endTimestamp: card._endTimestamp });
        } else {
            // No timer started yet (restored from server as paused) — start fresh
            startCountdown(card, secs, card._onDone || function () { onTimerExpired(card); });
        }
    }

    document.addEventListener('visibilitychange', function () {
        if (!document.hidden) {
            runningCards.forEach(function (card) {
                if (card._done) return;
                var remaining = Math.round((card._endTimestamp - Date.now()) / 1000);
                if (remaining <= 0) {
                    triggerDone(card);
                } else {
                    var m = Math.floor(remaining / 60);
                    var s = remaining % 60;
                    card.querySelector('.card-timer').textContent = String(m).padStart(2, '0') + ':' + String(s).padStart(2, '0');
                }
            });
        }
    });

    function setupPauseResume(card, sessionId, accountId) {
        var pauseBtn = card.querySelector('.card-pause-btn');
        var resumeBtn = card.querySelector('.card-resume-btn');
        var statusBadge = card.querySelector('.card-status');

        pauseBtn.addEventListener('click', function () {
            pauseBtn.disabled = true;
            fetch('/play/pause-session/', {
                method: 'POST',
                headers: { 'Content-Type': 'application/json', 'X-CSRFToken': getCsrf() },
                body: JSON.stringify({ session_id: sessionId }),
            })
            .then(r => r.json())
            .then(function (data) {
                if (data.ok) {
                    pauseCountdown(card);
                    pauseBtn.style.display = 'none';
                    resumeBtn.style.display = 'inline-block';
                    statusBadge.textContent = 'Paused';
                    statusBadge.className = 'badge bg-warning card-status';
                    pauseBtn.disabled = false;
                }
            });
        });

        resumeBtn.addEventListener('click', function () {
            resumeBtn.disabled = true;
            fetch('/play/resume-session/', {
                method: 'POST',
                headers: { 'Content-Type': 'application/json', 'X-CSRFToken': getCsrf() },
                body: JSON.stringify({ session_id: sessionId }),
            })
            .then(r => r.json())
            .then(function (data) {
                if (data.ok && data.seconds_left) {
                    var newEndDate = new Date(Date.now() + data.seconds_left * 1000);
                    card.querySelector('.card-end-time').textContent =
                        String(newEndDate.getHours()).padStart(2, '0') + ':' + String(newEndDate.getMinutes()).padStart(2, '0');
                    resumeCountdown(card, data.seconds_left);
                    resumeBtn.style.display = 'none';
                    pauseBtn.style.display = 'inline-block';
                    statusBadge.textContent = 'Playing';
                    statusBadge.className = 'badge bg-success card-status';
                    resumeBtn.disabled = false;
                }
            });
        });

        var stopBtn = card.querySelector('.card-stop-btn');
        stopBtn.addEventListener('click', function () {
            if (!confirm('Stop this session early? The actual time played will be saved.')) return;
            stopBtn.disabled = true;
            pauseCountdown(card);
            fetch('/play/stop-session/', {
                method: 'POST',
                headers: { 'Content-Type': 'application/json', 'X-CSRFToken': getCsrf() },
                body: JSON.stringify({ session_id: sessionId }),
            })
            .then(r => r.json())
            .then(function (data) {
                if (data.ok) doFinishSession(card, sessionId, accountId, data.remaining_after);
            });
        });

        var timeupStopBtn = card.querySelector('.card-timeup-stop-btn');
        timeupStopBtn.addEventListener('click', function () {
            timeupStopBtn.disabled = true;
            fetch('/play/stop-session/', {
                method: 'POST',
                headers: { 'Content-Type': 'application/json', 'X-CSRFToken': getCsrf() },
                body: JSON.stringify({ session_id: sessionId }),
            })
            .then(r => r.json())
            .then(function (data) {
                if (data.ok) doFinishSession(card, sessionId, accountId, data.remaining_after);
            });
        });
    }

    function onTimerExpired(card) {
        playBeep();
        card.querySelector('.card-running-section').style.display = 'none';
        card.querySelector('.card-timeup-section').style.display = 'block';
        card.querySelector('.card-status').textContent = "Time's up!";
        card.querySelector('.card-status').className = 'badge bg-danger card-status';
        card.querySelector('.card-quit-btn').style.display = 'none';
        card.dataset.sortPriority = '1';
        card.dataset.endMs = '0';
        sortSessionCards();
    }

    function doFinishSession(card, sessionId, accountId, remainingAfter) {
        displayedAccountIds.delete(accountId);
        card.querySelector('.card-running-section').style.display = 'none';
        card.querySelector('.card-timeup-section').style.display = 'none';
        card.querySelector('.card-done-section').style.display = 'block';
        card.querySelector('.card-status').textContent = 'Done';
        card.querySelector('.card-status').className = 'badge bg-secondary card-status';
        card.querySelector('.card-quit-btn').style.display = 'none';
        if (remainingAfter !== undefined && remainingAfter !== null) {
            card.querySelector('.card-done-remaining').textContent = 'Remaining today: ' + Math.round(remainingAfter) + ' min';
            if (remainingAfter < 20) markLastSessionDone(card);
        }
        card.dataset.sortPriority = '2';
        card.dataset.endMs = String(Number.MAX_SAFE_INTEGER);
        sortSessionCards();
        card.querySelector('.card-done-btn').addEventListener('click', function () {
            delete cardBySessionId[sessionId];
            fetch('/play/dismiss-session/', {
                method: 'POST',
                headers: { 'Content-Type': 'application/json', 'X-CSRFToken': getCsrf() },
                body: JSON.stringify({ session_id: sessionId }),
            }).finally(function () { card.remove(); updatePlayButton(); });
        });
    }

    // --- Service Worker ---
    var swRegistration = null;
    if ('serviceWorker' in navigator) {
        navigator.serviceWorker.register('/sw.js').then(function (reg) {
            swRegistration = reg;
        }).catch(function (err) { console.warn('SW registration failed:', err); });
    }

    if ('Notification' in window && Notification.permission === 'default') {
        Notification.requestPermission();
    }

    // --- Audio ---
    function buildSilentWav() {
        var sr = 8000, n = sr;
        var buf = new ArrayBuffer(44 + n * 2), v = new DataView(buf);
        function ws(o, s) { for (var i = 0; i < s.length; i++) v.setUint8(o + i, s.charCodeAt(i)); }
        ws(0,'RIFF'); v.setUint32(4,36+n*2,true); ws(8,'WAVE'); ws(12,'fmt ');
        v.setUint32(16,16,true); v.setUint16(20,1,true); v.setUint16(22,1,true);
        v.setUint32(24,sr,true); v.setUint32(28,sr*2,true); v.setUint16(32,2,true);
        v.setUint16(34,16,true); ws(36,'data'); v.setUint32(40,n*2,true);
        return URL.createObjectURL(new Blob([buf], { type: 'audio/wav' }));
    }

    var silentAudio = new Audio(buildSilentWav());
    silentAudio.loop = true;
    silentAudio.volume = 1.0;

    var audioCtx = new (window.AudioContext || window.webkitAudioContext)();
    var audioUnlocked = false;

    function unlockAudio() {
        if (audioUnlocked) return;
        silentAudio.play().then(function () { audioUnlocked = true; }).catch(function () {});
        audioCtx.resume().catch(function () {});
    }

    silentAudio.addEventListener('pause', function () {
        if (audioUnlocked) silentAudio.play().catch(function () {});
    });

    ['click', 'keydown', 'touchstart'].forEach(function (evt) {
        document.addEventListener(evt, unlockAudio);
    });

    function playBeep() {
        if (swRegistration && 'Notification' in window && Notification.permission === 'granted') {
            swRegistration.showNotification('Session Complete', {
                body: 'A play session has finished!',
                icon: '/static/favicon.ico',
                requireInteraction: true,
                tag: 'session-done-' + Date.now(),
            });
        }
        var originalTitle = document.title;
        var flashCount = 0;
        var flashInterval = setInterval(function () {
            document.title = (flashCount % 2 === 0) ? 'SESSION DONE!' : originalTitle;
            if (++flashCount > 20) { clearInterval(flashInterval); document.title = originalTitle; }
        }, 500);
        audioCtx.resume().then(function () {
            var osc = audioCtx.createOscillator();
            var gain = audioCtx.createGain();
            osc.connect(gain);
            gain.connect(audioCtx.destination);
            osc.type = 'sine';
            osc.frequency.value = 880;
            gain.gain.setValueAtTime(0.6, audioCtx.currentTime);
            gain.gain.exponentialRampToValueAtTime(0.001, audioCtx.currentTime + 1.5);
            osc.start(audioCtx.currentTime);
            osc.stop(audioCtx.currentTime + 1.5);
        }).catch(function () {});
    }

    function restoreDoneCard(account, sessionId, remainingAfter, createdBy) {
        displayedAccountIds.add(account.id);

        var tpl = document.getElementById('session-card-tpl');
        var card = tpl.content.cloneNode(true).querySelector('.session-card');
        card.dataset.accountId = account.id;
        card.dataset.sortPriority = '2';
        card.dataset.endMs = String(Number.MAX_SAFE_INTEGER);
        cardBySessionId[sessionId] = card;

        card.querySelector('.card-nick').textContent = account.nick;
        if (createdBy) {
            var createdByEl = card.querySelector('.card-created-by');
            if (createdByEl) {
                createdByEl.innerHTML = 'Started by <strong>' + createdBy + '</strong>:';
                createdByEl.style.display = 'block';
            }
        }
        card.querySelector('.card-device-name').textContent = account.device_name || '-';
        card.querySelector('.card-platform').textContent = account.platform || '-';
        card.querySelector('.card-phone').textContent = account.phone || '-';
        card.querySelector('.card-withdraw-pass').textContent = account.withdraw_pass || '-';
        card.querySelector('.card-min-balance').textContent = account.min_balance || '0.00';
        card.querySelector('.card-pending-section').style.display = 'none';
        card.querySelector('.card-running-section').style.display = 'none';
        card.querySelector('.card-timeup-section').style.display = 'none';
        card.querySelector('.card-done-section').style.display = 'block';
        card.style.backgroundColor = '#d1f5d3';
        card.style.borderColor = '#6dbb74';
        card.querySelector('.card-quit-btn').style.display = 'none';
        card.querySelector('.card-status').textContent = 'Done';
        card.querySelector('.card-status').className = 'badge bg-secondary card-status';
        if (remainingAfter !== undefined && remainingAfter !== null) {
            card.querySelector('.card-done-remaining').textContent = 'Remaining today: ' + Math.round(remainingAfter) + ' min';
            if (remainingAfter < 20) markLastSessionDone(card);
        }

        card.querySelector('.card-done-btn').addEventListener('click', function () {
            delete cardBySessionId[sessionId];
            fetch('/play/dismiss-session/', {
                method: 'POST',
                headers: { 'Content-Type': 'application/json', 'X-CSRFToken': getCsrf() },
                body: JSON.stringify({ session_id: sessionId }),
            }).finally(function () {
                displayedAccountIds.delete(account.id);
                card.remove();
                updatePlayButton();
            });
        });

        document.getElementById('session-list').appendChild(card);
        updatePlayButton();
    }

    function restoreSessionCard(account, sessionId, secondsLeft, endTime, paused, createdBy, timedOut, remainingAfter) {
        displayedAccountIds.add(account.id);

        var tpl = document.getElementById('session-card-tpl');
        var card = tpl.content.cloneNode(true).querySelector('.session-card');
        card.dataset.accountId = account.id;
        cardBySessionId[sessionId] = card;

        card.querySelector('.card-nick').textContent = account.nick;
        if (createdBy) {
            var createdByEl = card.querySelector('.card-created-by');
            if (createdByEl) {
                createdByEl.innerHTML = 'Started by <strong>' + createdBy + '</strong>:';
                createdByEl.style.display = 'block';
            }
        }
        card.querySelector('.card-device-name').textContent = account.device_name || '-';
        card.querySelector('.card-platform').textContent = account.platform || '-';
        card.querySelector('.card-phone').textContent = account.phone || '-';
        card.querySelector('.card-withdraw-pass').textContent = account.withdraw_pass || '-';
        card.querySelector('.card-min-balance').textContent = account.min_balance || '0.00';
        card.querySelector('.card-pending-section').style.display = 'none';
        card.style.backgroundColor = '#d1f5d3';
        card.style.borderColor = '#6dbb74';

        card.dataset.endMs = timedOut ? '0' : String(Date.now() + secondsLeft * 1000);
        card.dataset.sortPriority = timedOut ? '1' : '4';

        if (timedOut) {
            card.querySelector('.card-running-section').style.display = 'none';
            card.querySelector('.card-timeup-section').style.display = 'block';
            card.querySelector('.card-quit-btn').style.display = 'none';
            card.querySelector('.card-status').textContent = "Time's up!";
            card.querySelector('.card-status').className = 'badge bg-danger card-status';
        } else if (paused) {
            card.querySelector('.card-running-section').style.display = 'block';
            var restoredEnd = new Date(Date.now() + secondsLeft * 1000);
            card.querySelector('.card-end-time').textContent =
                String(restoredEnd.getHours()).padStart(2, '0') + ':' + String(restoredEnd.getMinutes()).padStart(2, '0');
            card.querySelector('.card-status').textContent = 'Paused';
            card.querySelector('.card-status').className = 'badge bg-warning card-status';
            card.querySelector('.card-pause-btn').style.display = 'none';
            card.querySelector('.card-resume-btn').style.display = 'inline-block';
            card._pausedSecondsLeft = secondsLeft;
            card._paused = true;
            card._onDone = function () { onTimerExpired(card); };
        } else {
            card.querySelector('.card-running-section').style.display = 'block';
            var restoredEnd = new Date(Date.now() + secondsLeft * 1000);
            card.querySelector('.card-end-time').textContent =
                String(restoredEnd.getHours()).padStart(2, '0') + ':' + String(restoredEnd.getMinutes()).padStart(2, '0');
            card.querySelector('.card-status').textContent = 'Playing';
            card.querySelector('.card-status').className = 'badge bg-success card-status';
            card.querySelector('.card-quit-btn').style.display = 'none';
            if (remainingAfter !== undefined && remainingAfter !== null) {
                var raEl = card.querySelector('.card-remaining-after');
                raEl.textContent = 'After session: ' + Math.round(remainingAfter) + ' min remaining';
                raEl.style.display = 'block';
            }
            startCountdown(card, secondsLeft, function () { onTimerExpired(card); });
        }

        if (remainingAfter !== undefined && remainingAfter !== null && remainingAfter < 20) {
            markLastSession(card);
        }

        card.querySelector('.card-quit-btn').addEventListener('click', function () {
            displayedAccountIds.delete(account.id);
            delete cardBySessionId[sessionId];
            fetch('/play/finish-session/', {
                method: 'POST',
                headers: { 'Content-Type': 'application/json', 'X-CSRFToken': getCsrf() },
                body: JSON.stringify({ session_id: sessionId }),
            }).finally(function () { card.remove(); });
        });

        setupPauseResume(card, sessionId, account.id);
        document.getElementById('session-list').appendChild(card);
        updatePlayButton();
    }

    function restoreActiveSessions() {
        fetch('/play/active-sessions/')
            .then(function (r) {
                if (!r.ok) { console.error('active-sessions HTTP error', r.status); return null; }
                return r.json();
            })
            .then(function (data) {
                if (!data) return;
                data.sessions.forEach(function (s) {
                    restoreSessionCard(s.account, s.session_id, s.seconds_left, s.end_time, s.paused, s.created_by, s.timed_out, s.remaining_after);
                });
                (data.done || []).forEach(function (d) {
                    restoreDoneCard(d.account, d.session_id, d.remaining_after, d.created_by);
                });
                (data.pending || []).forEach(function (p) {
                    addSessionCard(p.account, p.duration_minutes, p.remaining_minutes, Date.now() + p.expires_in_seconds * 1000, p.session_id);
                });
                sortSessionCards();
            })
            .catch(function (e) { console.error('active-sessions fetch error', e); });
    }

    // --- Server-sync poll: keeps all superuser browsers in sync ---
    function pollSessions() {
        fetch('/play/active-sessions/')
            .then(function (r) { return r.json(); })
            .then(function (data) {
                var serverIds = new Set();

                data.sessions.forEach(function (s) {
                    serverIds.add(s.session_id);
                    var card = cardBySessionId[s.session_id];
                    if (!card) {
                        // Session started on another browser — add it
                        restoreSessionCard(s.account, s.session_id, s.seconds_left, s.end_time, s.paused, s.created_by, s.timed_out, s.remaining_after);
                        sortSessionCards();
                        return;
                    }
                    if (card._done) return;
                    if (s.timed_out) { triggerDone(card); return; }

                    if (s.paused && !card._paused) {
                        // Server paused, client still running → sync
                        pauseCountdown(card);
                        card.querySelector('.card-pause-btn').style.display = 'none';
                        card.querySelector('.card-resume-btn').style.display = 'inline-block';
                        card.querySelector('.card-status').textContent = 'Paused';
                        card.querySelector('.card-status').className = 'badge bg-warning card-status';
                    } else if (!s.paused && card._paused) {
                        // Server running, client paused → sync
                        var newEnd = new Date(Date.now() + s.seconds_left * 1000);
                        card.querySelector('.card-end-time').textContent =
                            String(newEnd.getHours()).padStart(2, '0') + ':' + String(newEnd.getMinutes()).padStart(2, '0');
                        resumeCountdown(card, s.seconds_left);
                        card.querySelector('.card-resume-btn').style.display = 'none';
                        card.querySelector('.card-pause-btn').style.display = 'inline-block';
                        card.querySelector('.card-status').textContent = 'Playing';
                        card.querySelector('.card-status').className = 'badge bg-success card-status';
                    } else if (!s.paused && !card._paused && card._endTimestamp) {
                        // Both running: re-sync if drifted more than 10s
                        var localLeft = Math.round((card._endTimestamp - Date.now()) / 1000);
                        if (Math.abs(s.seconds_left - localLeft) > 10) {
                            card._endTimestamp = Date.now() + s.seconds_left * 1000;
                            timerWorker.postMessage({ cmd: 'resume', id: card._timerId, endTimestamp: card._endTimestamp });
                        }
                    }
                });

                (data.done || []).forEach(function (d) {
                    serverIds.add(d.session_id);
                    if (!cardBySessionId[d.session_id]) {
                        restoreDoneCard(d.account, d.session_id, d.remaining_after, d.created_by);
                        sortSessionCards();
                    }
                });

                (data.pending || []).forEach(function (p) {
                    serverIds.add(p.session_id);
                });

                // Remove cards for sessions that disappeared from server (ended elsewhere)
                Object.keys(cardBySessionId).forEach(function (sid) {
                    if (serverIds.has(parseInt(sid))) return;
                    var card = cardBySessionId[sid];
                    if (!card || !card.parentNode) { delete cardBySessionId[sid]; return; }
                    // Keep done-section cards — user still needs to dismiss them
                    var doneSection = card.querySelector('.card-done-section');
                    if (doneSection && doneSection.style.display !== 'none') return;
                    // Card still showing as active but session is gone — remove it
                    displayedAccountIds.delete(parseInt(card.dataset.accountId));
                    if (card._timerId) timerWorker.postMessage({ cmd: 'stop', id: card._timerId });
                    card.remove();
                    delete cardBySessionId[sid];
                    updatePlayButton();
                });
            })
            .catch(function (e) { console.error('session-poll error:', e); });
    }

    restoreActiveSessions();
    setInterval(pollSessions, 15000);
    document.getElementById('btn-play').addEventListener('click', fetchAndAddSession);
})();
</script>
