{% extends 'base.html' %}

{% block title %}Deposits & Withdrawals{% endblock %}

{% block content %}
<div class="container-fluid py-4" style="max-width: 1200px;">

    <!-- Header -->
    <!-- <div class="d-flex justify-content-between align-items-center mb-4">
        <h4 class="mb-0 fw-semibold"><i class="bi bi-cash-stack me-2"></i>Deposits & Withdrawals</h4>
        <div class="d-flex gap-2">
            <a href="{% url 'deposit_new_page' %}" class="btn btn-danger px-4">
                <i class="bi bi-arrow-down-circle me-1"></i> New Deposit
            </a>
            <a href="{% url 'withdrawal_new_page' %}" class="btn btn-success px-4">
                <i class="bi bi-arrow-up-circle me-1"></i> New Withdrawal
            </a>
        </div>
    </div> -->
	<div class="row mb-4 g-2">
		<div class="col-6">
			<a href="{% url 'deposit_new_page' %}" class="btn btn-danger btn-lg w-100 py-3">
                <i class="bi bi-arrow-down-circle me-1"></i> New Deposit
            </a>
		</div>
		<div class="col-6">
			<a href="{% url 'withdrawal_new_page' %}" class="btn btn-success btn-lg w-100 py-3">
                <i class="bi bi-arrow-up-circle me-1"></i> New Withdrawal
            </a>
		</div>
	</div>

    <!-- Summary cards -->
    <div class="row mb-4 g-3">
        <div class="col-md-4">
            <div class="card h-100 border-0 shadow-sm">
                <div class="card-body text-center py-3">
                    <div class="text-muted small mb-1">Total Deposits</div>
                    <div class="fs-4 fw-bold text-danger" id="total-deposits">—</div>
                </div>
            </div>
        </div>
        <div class="col-md-4">
            <div class="card h-100 border-0 shadow-sm">
                <div class="card-body text-center py-3">
                    <div class="text-muted small mb-1">Total Withdrawals</div>
                    <div class="fs-4 fw-bold text-success" id="total-withdrawals">—</div>
                </div>
            </div>
        </div>
        <div class="col-md-4">
            <div class="card h-100 border-0 shadow-sm">
                <div class="card-body text-center py-3">
                    <div class="text-muted small mb-1">Net</div>
                    <div class="fs-4 fw-bold" id="total-net">—</div>
                </div>
            </div>
        </div>
    </div>

    <!-- Filters -->
    <div class="card border-0 shadow-sm mb-4">
        <div class="card-body">
            <div class="row g-2 align-items-end">
                <div class="col-md-4 position-relative">
                    <label class="form-label small text-muted mb-1">Account</label>
                    <input type="text" id="filter-q" class="form-control" placeholder="Search by nickname or API key..." autocomplete="off">
                    <input type="hidden" id="filter-account-id">
                    <div id="search-results" class="list-group position-absolute shadow" style="z-index:100; display:none; max-height:250px; overflow-y:auto; width:calc(100% - 24px);"></div>
                    <div id="selected-account" class="mt-2" style="display:none;">
                        <span class="badge bg-primary" id="selected-badge"></span>
                        <button type="button" class="btn btn-sm btn-link p-0 ms-2 text-secondary" id="btn-clear-account">Change</button>
                    </div>
                </div>
                <div class="col-md-2">
                    <label class="form-label small text-muted mb-1">From</label>
                    <input type="date" id="filter-from" class="form-control" value="{{ default_from }}">
                </div>
                <div class="col-md-2">
                    <label class="form-label small text-muted mb-1">To</label>
                    <input type="date" id="filter-to" class="form-control" value="{{ default_to }}">
                </div>
                <div class="col-md-1">
                    <label class="form-label small text-muted mb-1">Status</label>
                    <select id="filter-status" class="form-select">
                        <option value="">All</option>
                        <option value="active" selected>Pending & Completed</option>
                        <option value="pending">Pending</option>
                        <option value="completed">Completed</option>
                        <option value="cancelled">Cancelled</option>
                    </select>
                </div>
                <div class="col-md-1">
                    <label class="form-label small text-muted mb-1">Operation</label>
                    <select id="filter-op" class="form-select">
                        <option value="">All</option>
                        <option value="deposit">Deposit</option>
                        <option value="withdrawal">Withdrawal</option>
                    </select>
                </div>
                <div class="col-md-2 d-flex gap-2">
                    <button id="btn-filter" class="btn btn-primary flex-fill">
                        <i class="bi bi-funnel"></i> Filter
                    </button>
                    <button id="btn-clear" class="btn btn-outline-secondary flex-fill">Clear</button>
                </div>
            </div>
        </div>
    </div>

    <!-- History table -->
    <div class="card border-0 shadow-sm">
        <div class="card-header bg-transparent border-bottom d-flex justify-content-between align-items-center py-3">
            <span class="fw-semibold">Transactions</span>
            <small class="text-muted" id="entries-count"></small>
        </div>
        <div class="card-body p-0">
            <div class="table-responsive">
                <table class="table table-hover align-middle mb-0">
                    <thead class="table-dark">
                        <tr>
                            <th class="ps-3">Date</th>
                            <th>Account</th>
                            <th>Wallet Name</th>
                            <th>Operation</th>
                            <th class="text-end pe-4">Amount</th>
                            <th class="ps-4">Status</th>
                            <th class="pe-3"></th>
                        </tr>
                    </thead>
                    <tbody id="history-body">
                        <tr>
                            <td colspan="7" class="text-center text-muted py-4">
                                <div class="spinner-border spinner-border-sm me-2" role="status"></div>Loading...
                            </td>
                        </tr>
                    </tbody>
                </table>
            </div>
        </div>
        <!-- Pagination -->
        <div class="card-footer bg-transparent d-none d-flex justify-content-between align-items-center py-2" id="pagination-footer">
            <small class="text-muted" id="pagination-info"></small>
            <div class="d-flex gap-2">
                <button class="btn btn-sm btn-outline-secondary" id="btn-prev" disabled>&laquo; Prev</button>
                <button class="btn btn-sm btn-outline-secondary" id="btn-next" disabled>Next &raquo;</button>
            </div>
        </div>
    </div>

</div>

{% endblock %}

{% block extra_js %}
<script>
function getCsrf() {
    return document.cookie.split('; ')
        .find(c => c.startsWith('csrftoken='))?.split('=')[1] || '';
}

var filterSelectedNick = '';

// ── Filter search autocomplete ──────────────────────────────────────────────
var filterSearchTimer = null;
var filterInput = document.getElementById('filter-q');
var filterResults = document.getElementById('search-results');

filterInput.addEventListener('input', function () {
    clearTimeout(filterSearchTimer);
    var q = this.value.trim();
    if (q.length < 1) { filterResults.style.display = 'none'; return; }
    filterSearchTimer = setTimeout(function () {
        fetch('/account-search/?q=' + encodeURIComponent(q))
            .then(r => r.json())
            .then(data => {
                filterResults.innerHTML = '';
                if (!data.results.length) {
                    filterResults.innerHTML = '<div class="list-group-item text-muted">No accounts found</div>';
                    filterResults.style.display = '';
                    return;
                }
                data.results.forEach(function (acc) {
                    var item = document.createElement('a');
                    item.href = '#';
                    item.className = 'list-group-item list-group-item-action py-2';
                    item.textContent = acc.nick + ' (' + (acc.platform || 'N/A') + ')' + (acc.api ? '  —  ' + acc.api : '');
                    item.addEventListener('click', function (e) {
                        e.preventDefault();
                        document.getElementById('filter-account-id').value = acc.id;
                        filterSelectedNick = acc.nick;
                        document.getElementById('selected-badge').textContent = acc.nick + ' (' + (acc.platform || 'N/A') + ')';
                        document.getElementById('selected-account').style.display = '';
                        filterInput.style.display = 'none';
                        filterResults.style.display = 'none';
                    });
                    filterResults.appendChild(item);
                });
                filterResults.style.display = '';
            });
    }, 250);
});

document.addEventListener('click', function (e) {
    if (!filterInput.contains(e.target) && !filterResults.contains(e.target))
        filterResults.style.display = 'none';
});

document.getElementById('btn-clear-account').addEventListener('click', function () {
    document.getElementById('filter-account-id').value = '';
    filterSelectedNick = '';
    filterInput.value = '';
    filterInput.style.display = '';
    document.getElementById('selected-account').style.display = 'none';
    filterInput.focus();
});

// ── Load history ────────────────────────────────────────────────────────────
var currentPage = 1;

function loadHistory(params) {
    params = params || {};
    if (!params.page) params.page = 1;
    currentPage = parseInt(params.page);
    window._lastHistoryParams = params;
    var qs = new URLSearchParams(params).toString();
    document.getElementById('history-body').innerHTML =
        '<tr><td colspan="7" class="text-center text-muted py-4"><div class="spinner-border spinner-border-sm me-2" role="status"></div>Loading...</td></tr>';

    fetch('/deposit-withdrawal/history/' + (qs ? '?' + qs : ''))
        .then(r => r.json())
        .then(function (data) {
            var dep = parseFloat(data.totals.deposits) || 0;
            var wd = parseFloat(data.totals.withdrawals) || 0;
            var net = wd - dep;

            document.getElementById('total-deposits').textContent = dep.toFixed(2);
            document.getElementById('total-withdrawals').textContent = wd.toFixed(2);
            var netEl = document.getElementById('total-net');
            netEl.textContent = (net >= 0 ? '+' : '') + net.toFixed(2);
            netEl.className = 'fs-4 fw-bold ' + (net >= 0 ? 'text-success' : 'text-danger');

            var tbody = document.getElementById('history-body');
            var pg = data.pagination;
            var total = pg.total_count;
            document.getElementById('entries-count').textContent = total + ' record' + (total !== 1 ? 's' : '');

            if (!data.entries.length) {
                tbody.innerHTML = '<tr><td colspan="7" class="text-center text-muted py-4">No entries found</td></tr>';
                document.getElementById('pagination-footer').classList.add('d-none');
                return;
            }
            tbody.innerHTML = '';
            data.entries.forEach(function (e) {
                var tr = document.createElement('tr');
                var isDeposit = e.type === 'deposit';

                var opBadge = isDeposit
                    ? '<span class="badge bg-danger-subtle text-danger border border-danger-subtle">Deposit</span>'
                    : '<span class="badge bg-success-subtle text-success border border-success-subtle">Withdrawal</span>';

                // Warning badge for withdrawals where first_withdraw is not set
                var firstWdBadge = '';
                if (!isDeposit && !e.first_withdraw) {
                    firstWdBadge = ' <span class="badge bg-warning text-dark" title="First withdrawal not recorded">No 1st WD</span>';
                }

                var amountHtml = isDeposit
                    ? '<span class="text-danger fw-semibold">-' + e.amount + '</span>'
                    : '<span class="text-success fw-semibold">+' + e.amount + '</span>';

                var statusMap = {
                    pending:   '<span class="badge bg-warning-subtle text-warning border border-warning-subtle">Pending</span>',
                    completed: '<span class="badge bg-success-subtle text-success border border-success-subtle">Completed</span>',
                    cancelled: '<span class="badge bg-danger-subtle text-danger border border-danger-subtle">Cancelled</span>',
                };
                var statusBadge = statusMap[e.status] || e.status;

                // Action buttons: View always, plus approve/cancel for pending
                var actionHtml = '<a href="/deposit-withdrawal/entry/' + e.type + '/' + e.id + '/" class="btn btn-sm btn-outline-primary me-1">View</a>';
                if (e.status === 'pending') {
                    actionHtml +=
                        '<button class="btn btn-sm btn-outline-success me-1 btn-dw-action" data-type="' + e.type + '" data-id="' + e.id + '" data-action="completed" title="Complete"><i class="bi bi-check-lg"></i></button>' +
                        '<button class="btn btn-sm btn-outline-danger btn-dw-action" data-type="' + e.type + '" data-id="' + e.id + '" data-action="cancelled" title="Cancel"><i class="bi bi-x-lg"></i></button>';
                }

                tr.innerHTML =
                    '<td class="ps-3 text-nowrap text-muted small">' + e.created_at + '</td>' +
                    '<td class="fw-semibold">' + e.account + firstWdBadge + '</td>' +
                    '<td class="text-muted small">' + (e.wallet_name || '—') + '</td>' +
                    '<td>' + opBadge + '</td>' +
                    '<td class="text-end pe-4">' + amountHtml + '</td>' +
                    '<td class="ps-4">' + statusBadge + '</td>' +
                    '<td class="pe-3 text-end text-nowrap">' + actionHtml + '</td>';
                tbody.appendChild(tr);
            });

            // Pagination controls
            var footer = document.getElementById('pagination-footer');
            if (pg.total_pages > 1) {
                footer.classList.remove('d-none');
                var start = (pg.page - 1) * 25 + 1;
                var end = Math.min(pg.page * 25, pg.total_count);
                document.getElementById('pagination-info').textContent = 'Showing ' + start + '–' + end + ' of ' + pg.total_count;
                document.getElementById('btn-prev').disabled = (pg.page <= 1);
                document.getElementById('btn-next').disabled = (pg.page >= pg.total_pages);
            } else {
                footer.classList.add('d-none');
            }
        });
}

// ── Pagination buttons ──────────────────────────────────────────────────────
document.getElementById('btn-prev').addEventListener('click', function () {
    if (currentPage > 1) {
        var params = Object.assign({}, window._lastHistoryParams);
        params.page = currentPage - 1;
        loadHistory(params);
    }
});
document.getElementById('btn-next').addEventListener('click', function () {
    var params = Object.assign({}, window._lastHistoryParams);
    params.page = currentPage + 1;
    loadHistory(params);
});

// ── Quick approve / cancel ──────────────────────────────────────────────────
document.getElementById('history-body').addEventListener('click', function (ev) {
    var btn = ev.target.closest('.btn-dw-action');
    if (!btn) return;
    var tr = btn.closest('tr');
    var newStatus = btn.dataset.action;
    btn.disabled = true;
    fetch('/dw-entry/update/', {
        method: 'POST',
        headers: {'Content-Type': 'application/json', 'X-CSRFToken': getCsrf()},
        body: JSON.stringify({type: btn.dataset.type, id: +btn.dataset.id, status: newStatus})
    }).then(function (r) { return r.json(); }).then(function (data) {
        if (!data.ok) { btn.disabled = false; return; }
        var statusMap = {
            completed: '<span class="badge bg-success-subtle text-success border border-success-subtle">Completed</span>',
            cancelled: '<span class="badge bg-danger-subtle text-danger border border-danger-subtle">Cancelled</span>',
        };
        tr.cells[5].innerHTML = statusMap[newStatus] || newStatus;
        tr.cells[6].innerHTML = '<a href="/deposit-withdrawal/entry/' + btn.dataset.type + '/' + btn.dataset.id + '/" class="btn btn-sm btn-outline-primary me-1">View</a>';
    });
});

// ── Filter / Clear buttons ──────────────────────────────────────────────────
document.getElementById('btn-filter').addEventListener('click', function () {
    var params = {};
    if (filterSelectedNick) params.q = filterSelectedNick;
    else { var q = filterInput.value.trim(); if (q) params.q = q; }
    var from = document.getElementById('filter-from').value;
    var to = document.getElementById('filter-to').value;
    var status = document.getElementById('filter-status').value;
    var op = document.getElementById('filter-op').value;
    if (from) params.date_from = from;
    if (to) params.date_to = to;
    if (status) params.status = status;
    if (op) params.op = op;
    params.page = 1;
    loadHistory(params);
});

document.getElementById('btn-clear').addEventListener('click', function () {
    document.getElementById('filter-account-id').value = '';
    filterSelectedNick = '';
    filterInput.value = '';
    filterInput.style.display = '';
    document.getElementById('selected-account').style.display = 'none';
    document.getElementById('filter-from').value = '';
    document.getElementById('filter-to').value = '';
    document.getElementById('filter-status').value = '';
    document.getElementById('filter-op').value = '';
    loadHistory();
});

// ── Load on page ready ───────────────────────────────────────────────────────
loadHistory({ date_from: '{{ default_from }}', date_to: '{{ default_to }}', status: document.getElementById('filter-status').value });
</script>
{% endblock %}
