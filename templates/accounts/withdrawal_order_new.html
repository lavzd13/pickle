{% extends 'base.html' %}
{% block title %}Withdrawal Order{% endblock %}

{% block content %}
<div class="container py-4" style="max-width: 600px;">

    <div class="d-flex align-items-center gap-3 mb-4">
        <a href="{% url 'deposit_withdrawal' %}" class="btn btn-outline-secondary btn-sm">
            <i class="bi bi-arrow-left"></i>
        </a>
        <h4 class="mb-0 fw-semibold"><i class="bi bi-arrow-up-circle me-2 text-success"></i>Withdrawal Order</h4>
    </div>

    <!-- Account info -->
    <div class="row g-2 mb-3">
        <div class="col-6">
            <div class="card border-0 shadow-sm h-100">
                <div class="card-body py-2">
                    <div class="text-muted" style="font-size:.72rem;">Account</div>
                    <div class="fw-semibold">{{ account.nick }}</div>
                </div>
            </div>
        </div>
        <div class="col-6">
            <div class="card border-0 shadow-sm h-100">
                <div class="card-body py-2">
                    <div class="text-muted" style="font-size:.72rem;">Platform</div>
                    <div>{{ account.platform|default:"—" }}</div>
                </div>
            </div>
        </div>
    </div>

    <!-- Form -->
    <div class="card border-0 shadow-sm">
        <div class="card-body">
            <div class="mb-3">
                <label class="form-label text-muted small">Current Balance</label>
                <input type="number" id="f-balance" class="form-control" step="0.01" min="0" placeholder="0.00">
            </div>
            <div id="form-error" class="alert alert-danger py-2" style="display:none;"></div>
            <div class="d-flex gap-2">
                <a href="{% url 'deposit_withdrawal' %}" class="btn btn-outline-secondary flex-fill">Cancel</a>
                <button type="button" id="btn-submit" class="btn btn-success flex-fill">Submit Withdrawal Order</button>
            </div>
        </div>
    </div>

</div>
{% endblock %}

{% block extra_js %}
<script>
function getCsrf() {
    return document.cookie.split('; ').find(c => c.startsWith('csrftoken='))?.split('=')[1] || '';
}

document.getElementById('btn-submit').addEventListener('click', function () {
    var errDiv = document.getElementById('form-error');
    errDiv.style.display = 'none';

    var balance = document.getElementById('f-balance').value;
    if (balance === '' || parseFloat(balance) < 0) {
        errDiv.textContent = 'Enter a valid balance';
        errDiv.style.display = '';
        return;
    }

    this.disabled = true;

    fetch('/withdrawal-order/create/', {
        method: 'POST',
        headers: { 'Content-Type': 'application/json', 'X-CSRFToken': getCsrf() },
        body: JSON.stringify({
            account_id: {{ account.id }},
            current_balance: parseFloat(balance),
        }),
    })
    .then(r => r.json())
    .then(function (data) {
        if (data.error) {
            document.getElementById('btn-submit').disabled = false;
            errDiv.textContent = data.error;
            errDiv.style.display = '';
            return;
        }
        window.location.href = '{% url "deposit_withdrawal" %}';
    })
    .catch(function () {
        document.getElementById('btn-submit').disabled = false;
        errDiv.textContent = 'An error occurred. Please try again.';
        errDiv.style.display = '';
    });
});
</script>
{% endblock %}
